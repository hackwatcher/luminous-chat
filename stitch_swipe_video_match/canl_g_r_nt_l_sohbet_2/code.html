<!DOCTYPE html>

</div>
<div class="flex items-center gap-4">

<span class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant">Live: 12.4k</span>
</div>
<button class="text-slate-400 hover:text-primary transition-all scale-95 active:scale-90">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<main class="relative h-screen w-full flex flex-col">

</div>
<div class="space-y-1">
<div class="flex items-end gap-3">
<h2 class="text-4xl font-extrabold tracking-tight font-headline text-on-surface leading-none">Maya, 23</h2>
<span class="text-on-surface-variant label-sm mb-1">Barcelona, ES</span>
</div>
<p class="text-on-surface-variant font-body text-lg italic opacity-90">"Looking for someone to talk about the latest boiler room set."</p>
</div>
</div>
</section>
<!-- Current User Video Preview (Asymmetric Float) -->
<button class="absolute bottom-36 right-8 w-40 h-56 rounded-xl overflow-hidden ring-4 ring-surface-container-highest shadow-2xl z-20 group transform rotate-2 hover:rotate-0 transition-all duration-500 hover:scale-105 active:scale-95">

<div class="absolute top-2 left-2 flex items-center gap-1 bg-black/40 backdrop-blur-sm px-2 py-0.5 rounded-full">
<span class="w-1.5 h-1.5 rounded-full bg-error animate-pulse"></span>
<span class="text-[8px] font-bold uppercase tracking-tighter text-white">REC</span>
</div>
</button>
<!-- Controls Dock -->
<div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-30 w-full max-w-xl px-6">
<div class="bg-surface-container-low/70 backdrop-blur-2xl rounded-full p-4 flex items-center justify-between shadow-[0_8px_40px_rgba(0,0,0,0.5)] border border-outline-variant/10">
<!-- End Call -->
<button class="w-14 h-14 rounded-full flex items-center justify-center bg-error-container text-on-error hover:bg-error-dim transition-all active:scale-90 group">
<span class="material-symbols-outlined transition-transform" style="font-variation-settings: 'FILL' 1;">call_end</span>
</button>
<!-- Center Controls: Mute/Video Toggle -->
<div class="flex items-center gap-4">
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container-highest text-on-surface-variant hover:text-primary transition-all active:bg-error-container active:text-on-error" onclick="this.classList.toggle('active-mic-off')">
<span class="material-symbols-outlined">mic_off</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container-highest text-on-surface-variant hover:text-primary transition-all active:bg-error-container active:text-on-error" onclick="this.classList.toggle('active-video-off')">
<span class="material-symbols-outlined">videocam</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container-highest text-on-surface-variant hover:text-primary transition-all active:scale-90">
<span class="material-symbols-outlined">chat_bubble</span>
</button>
</div>
<!-- Next User -->

<span class="font-headline">NEXT</span>
<span class="material-symbols-outlined">fast_forward</span>
</button>
</div>
</div>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-[#050f1c]/70 backdrop-blur-xl rounded-t-[3rem] shadow-[0_-8px_30px_rgba(110,59,215,0.1)]">
<a class="flex flex-col items-center justify-center text-slate-500 p-4 hover:text-primary transition-all scale-110 duration-300 ease-out active:scale-95" href="{{DATA:SCREEN:SCREEN_6}}">
<span class="material-symbols-outlined">style</span>
</a>
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#ba9eff] to-[#6e3bd7] text-white rounded-full p-4 shadow-[0_0_20px_rgba(186,158,255,0.4)] scale-110 duration-300 ease-out active:scale-100" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">videocam</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 p-4 hover:text-primary transition-all scale-110 duration-300 ease-out active:scale-95" href="{{DATA:SCREEN:SCREEN_5}}">
<span class="material-symbols-outlined">chat_bubble</span>
</a>
</nav>
</main>

</div>
<div class="text-left">

<p class="text-on-surface font-headline font-bold text-sm">Sophie is nearby</p>
</div>
</div>
</button>
</body></html>
