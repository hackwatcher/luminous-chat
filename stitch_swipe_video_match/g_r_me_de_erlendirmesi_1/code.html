<div class="flex items-center gap-2">

<span class="text-xl font-bold tracking-tight text-[#2a3439] dark:text-white font-manrope">Luminous</span>
</div>
<button class="material-symbols-outlined text-[#2a3439] dark:text-slate-400 hover:bg-[#e1e9ee] p-2 rounded-full transition-colors" data-icon="settings">settings</button>
</nav>
<!-- Content Canvas -->
<main class="flex-grow flex items-center justify-center p-4 relative">
<!-- Ambient Background Decoration -->
<div class="absolute inset-0 z-0 opacity-40">
<div class="absolute top-[10%] left-[15%] w-64 h-64 bg-primary-container rounded-full blur-[100px]"></div>
<div class="absolute bottom-[20%] right-[10%] w-80 h-80 bg-secondary-container rounded-full blur-[120px]"></div>
</div>
<!-- Evaluation Card -->
<div class="z-10 w-full max-w-md bg-surface-container-lowest rounded-[2rem] p-10 flex flex-col items-center text-center shadow-[0px_12px_32px_rgba(42,52,57,0.06)]">
<!-- Icon/Visual Header -->
<div class="mb-8 p-4 bg-primary-container rounded-full">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="sentiment_very_satisfied" style="font-variation-settings: 'FILL' 1;">sentiment_very_satisfied</span>
</div>
<!-- Question -->
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface mb-3">Görüşme nasıl geçti?</h1>
<p class="text-on-surface-variant font-body text-sm mb-10 leading-relaxed">Geri bildiriminiz bizim için çok değerli. Hizmet kalitemizi artırmamıza yardımcı olun.</p>
<!-- Reaction Icons (Luminous Style) -->
<div class="flex justify-between w-full mb-12 px-2">
<button class="group flex flex-col items-center gap-3 transition-all active:scale-95">
<div class="w-14 h-14 rounded-2xl bg-surface-container-low flex items-center justify-center group-hover:bg-error-container group-hover:text-on-error-container transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="sentiment_dissatisfied">sentiment_dissatisfied</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant group-hover:text-error">Kötü</span>
</button>
<button class="group flex flex-col items-center gap-3 transition-all active:scale-95">
<div class="w-14 h-14 rounded-2xl bg-surface-container-low flex items-center justify-center group-hover:bg-tertiary-container group-hover:text-on-tertiary-container transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="sentiment_neutral">sentiment_neutral</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant group-hover:text-tertiary">Normal</span>
</button>
<button class="group flex flex-col items-center gap-3 transition-all active:scale-95">
<div class="w-14 h-14 rounded-2xl bg-surface-container-low flex items-center justify-center group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="sentiment_satisfied">sentiment_satisfied</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant group-hover:text-primary">İyi</span>
</button>
<button class="group flex flex-col items-center gap-3 transition-all active:scale-95">
<div class="w-14 h-14 rounded-2xl bg-surface-container-low flex items-center justify-center group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="sentiment_very_satisfied">sentiment_very_satisfied</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant group-hover:text-primary">Harika</span>
</button>
</div>
<!-- Submit Button (Jewel CTA) -->
<button class="w-full py-4 rounded-full bg-gradient-to-br from-primary to-primary-dim text-white font-semibold text-base shadow-lg shadow-primary/20 hover:shadow-primary/30 transition-shadow active:scale-95 duration-150">
                Bitti
            </button>
<button class="mt-6 text-on-surface-variant text-sm font-medium hover:text-on-surface transition-colors">
                Daha sonra değerlendir

</div>
