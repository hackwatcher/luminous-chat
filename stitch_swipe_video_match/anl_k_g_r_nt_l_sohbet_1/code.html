<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Luminous - Video Chat</title>
<!-- Fonts -->

                "on-primary": "#faf6ff",
                "background": "#f7f9fb",
                "tertiary-container": "#ced6f5",
                "error-container": "#ff8b9a",
                "surface-variant": "#d9e4ea",
                "surface-container-highest": "#d9e4ea",
                "surface": "#f7f9fb",
                "outline-variant": "#a9b4b9",
                "surface-container-low": "#f0f4f7",

        },

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(24px);
      }
      .gradient-cta {
        background: linear-gradient(135deg, #494bd6 0%, #3c3dca 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="bg-[#f7f9fb] dark:bg-[#1a1c1e] w-full top-0 sticky z-40">
<div class="flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="close-up portrait of a friendly young man with short dark hair and a warm smile, soft natural indoor lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAYODy2N4_2Ah-2dO-1jtDNBDIs6tAXpEhzIsRgJjbYOzGnVxMCR7itq_lVq1fLZVbeGSLwkynwHzswPqmTUENnO3DceI-_u1v6DqPqghb3KYuhcueuRrcwGRCVaoIcHCwMGzM5ZZB4E0k4mvEeJXFtTkE967Dn_af7BbQdGP7K93ubXZLfezXeRJKS5SKJhLcVsbGVNs6gTpRMh5t_OsDSjuKZ6Tap6616HPbUfgRFb_4bluQmoq8xL9nZI46s60LsrQraAoMCNTGF"/>
</div>
<h1 class="font-['Manrope'] font-bold text-xl tracking-tight text-[#2a3439] dark:text-[#f7f9fb]">Luminous</h1>
</div>
<div class="flex items-center gap-4">
<div class="hidden md:flex gap-6 mr-4">
<button class="text-[#494bd6] font-semibold font-['Manrope'] hover:opacity-80 transition-opacity duration-300">Home</button>
<button class="text-[#2a3439] opacity-70 font-['Manrope'] hover:opacity-80 transition-opacity duration-300">History</button>
</div>
<button class="text-[#6366F1] dark:text-[#818cf8] scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow relative px-4 md:px-8 pb-32 md:pb-8 pt-4 flex flex-col gap-6">
<!-- Video Interface Container -->
<div class="flex-grow grid grid-cols-1 md:grid-cols-4 gap-6 relative">
<!-- Main Remote Video Stage -->
<div class="md:col-span-3 relative rounded-2xl overflow-hidden bg-surface-container shadow-sm">
<img alt="Remote Participant" class="w-full h-full object-cover" data-alt="portrait of a young woman laughing in a brightly lit modern living room with soft plants in the background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBhNyJmYLlGDxOv0_PfnV3DPQr7OHjXD_EfFBVxDKZ6gBK5kyDeAxr16o07nDclg0xJKTB_xKl5qWc1xUF08w4fhJNnPzjdXPzOQkzjZL2wfba-U7OFiyqw4TcLsLc8zua42YJS2yf0cNZsT92AYMbZVyNWqygx9sY1ctod66PJ1J-C80mkJyOzXNszBowZhLl2vubS8cT2KUzdZxsv3CB9bXCJ0phzBarQfs92bzEBQlZ2UG2vjcbvjzDZOEAglK7pimghtL19PSJj"/>
<!-- Overlay: Live Tag -->
<div class="absolute top-6 left-6 glass-effect px-4 py-2 rounded-full flex items-center gap-2">
<span class="w-2 h-2 bg-error rounded-full animate-pulse"></span>
<span class="font-label text-[0.75rem] font-bold uppercase tracking-[0.05em] text-on-surface">Live Connection</span>
</div>
<!-- Overlay: Floating Controls (Glassmorphism) -->
<div class="absolute bottom-8 left-1/2 -translate-x-1/2 glass-effect p-2 rounded-full flex items-center gap-2">
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container-highest text-on-surface hover:bg-white transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="mic">mic</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container-highest text-on-surface hover:bg-white transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="videocam">videocam</span>
</button>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container-highest text-on-surface hover:bg-white transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="flip_camera_ios">flip_camera_ios</span>
</button>
<div class="w-[1px] h-6 bg-outline-variant/30 mx-1"></div>
<button class="gradient-cta px-8 py-3 rounded-full text-white font-headline font-bold text-sm hover:opacity-90 active:scale-95 transition-all">
                        NEXT
                    </button>
</div>
</div>
<!-- Side Rail / Sidebar -->
<div class="flex flex-col gap-6">
<!-- Self Preview Card -->
<div class="relative aspect-video md:aspect-square rounded-2xl overflow-hidden bg-surface-container-low shadow-sm group">
<img alt="Self Preview" class="w-full h-full object-cover" data-alt="self-portrait view of a young man from a laptop camera perspective, clean home office background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA8w1mtc0Xp4gxU2aUHd851CvqMGSB0NfnlYHWqeE3MIieI4KEACuxrTgE_65bttoVc1QdhO6wLRWXANeOFXWWPaDbUc3zz4mVGH2krqhjPxRH_LPqg2iq7SifhmjHA2ZYVsDUZEWEXxnm47Jkh9ybsZQ_zlN466tURkVv27mhJQ0p32_3WUK7VixMobvL0LsGCa3OpwEeosBYQTXJ_bfD9tsOh8_6UwnX8927ecg3TdRCpafzctkTCLEaOoOy16kU4V2T9CaBrA4B5"/>
<div class="absolute bottom-3 left-3 glass-effect px-3 py-1 rounded-full">
<p class="font-label text-[0.65rem] font-bold uppercase tracking-wider text-on-surface">You</p>
</div>
</div>
<!-- Bento Chat/Info Area -->
<div class="flex-grow flex flex-col gap-4 bg-surface-container-low rounded-2xl p-6">
<div class="flex items-center justify-between">
<h3 class="font-headline font-bold text-on-surface">Real-time</h3>
<span class="material-symbols-outlined text-primary" data-icon="auto_awesome">auto_awesome</span>
</div>
<div class="flex-grow overflow-y-auto space-y-4 pr-2">
<!-- Message Bubbles (No Dividers Rule) -->
<div class="flex flex-col gap-1">
<span class="text-[0.65rem] font-bold text-on-surface-variant px-1">Luminous Bot</span>
<div class="bg-surface-container-high rounded-xl p-3 text-sm text-on-surface-variant">
                                Connected with someone new. Say hello!
                            </div>
</div>
<div class="flex flex-col gap-1 items-end">
<div class="bg-primary text-white rounded-xl p-3 text-sm">
                                Hey! How's it going?
                            </div>
</div>
<div class="flex flex-col gap-1">
<span class="text-[0.65rem] font-bold text-on-surface-variant px-1">Elena</span>
<div class="bg-white rounded-xl p-3 text-sm shadow-sm">
                                Pretty good! Just finished working on a design. You?
                            </div>
</div>
</div>
<!-- Input Area -->
<div class="mt-4 relative">
<input class="w-full bg-surface-container-high border-none rounded-full py-3 px-6 pr-12 text-sm focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-on-surface-variant/50" placeholder="Type a message..." type="text"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined p-2" data-icon="send">send</span>
</button>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-white/70 backdrop-blur-xl rounded-t-[1.5rem]">
<button class="flex flex-col items-center justify-center bg-[#494bd6] text-white rounded-full px-6 py-2 transition-all duration-200 Active:scale-95">
<span class="material-symbols-outlined" data-icon="videocam" style="font-variation-settings: 'FILL' 1;">videocam</span>
<span class="font-['Inter'] text-[0.75rem] font-medium uppercase tracking-[0.05em] mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-[#2a3439] dark:text-[#f7f9fb] opacity-50 px-6 py-2 hover:bg-[#f0f4f7] transition-colors">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] text-[0.75rem] font-medium uppercase tracking-[0.05em] mt-1">History</span>
</button>
</nav>
<!-- Floating Action Button (Suppressed on this task-focused screen) -->
</body></html>
