<style>

<body class="bg-background font-body h-full overflow-hidden text-on-surface select-none">
<!-- Main Full-Screen Video Background -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="Close-up portrait of a woman smiling during a video call, warm interior lighting, soft focus background, professional cinematic look" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBd6CiUSzgQ9Ao3EIAtEFdGVX6E85B2VtBt9Y5PDzQQh9ve9AthavO4OY8P0sMvKWVksYxnk4op9uScwAX2VDj8cojlG5A8Iu3_fl_jPbTiUx_F7YufI9kYmRPknJ2S2ly6-iOvZpeqHJF2tMCFcFLyjaeeWvjlN5zrRhtqF9dDnC3bEBm1MgO8fJ9s6oySw0KyW4qABoOmd7PtEFOJ3_p11y0wqUfHVho8kgJbSDFQEQIJ4n-7qtHu74k0SciL-hZo1zP2FizA5Jt4"/>

</div>
<!-- Top Navigation -->
<nav class="fixed top-0 left-0 right-0 z-50 p-6 flex justify-between items-start">
<button class="glass-panel flex items-center justify-center h-12 w-12 rounded-xl text-on-surface shadow-lg hover:bg-surface-container-lowest active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<!-- Room Status Info -->
<div class="flex flex-col items-end gap-2">
<div class="glass-panel px-4 py-2 rounded-full flex items-center gap-2 shadow-sm">
<div class="h-2 w-2 rounded-full bg-error animate-pulse"></div>
<span class="font-label text-[0.75rem] uppercase tracking-wider font-bold">12:45 Live</span>
</div>
<div class="glass-panel px-4 py-2 rounded-xl shadow-sm">
<h1 class="font-headline font-bold text-on-surface tracking-tight">Design Sync: Q4 Roadmap</h1>
</div>
</div>
</nav>
<!-- Chat Overlay Layer -->
<div class="fixed inset-x-0 bottom-[120px] z-40 px-6 flex flex-col pointer-events-none">
<!-- Messages Area (Scrollable) -->
<div class="max-h-[320px] overflow-y-auto space-y-4 py-4 pr-2 pointer-events-auto flex flex-col scroll-smooth chat-mask">
<!-- Message from other person -->
<div class="flex flex-col items-start max-w-[80%]">
<span class="font-headline text-[0.65rem] font-bold text-white mb-1 ml-2 opacity-80">Sarah</span>
<div class="glass-panel px-4 py-3 rounded-2xl rounded-bl-none shadow-sm">
<p class="text-sm font-body leading-relaxed">Let's look at the prototype again.</p>
</div>
</div>
<!-- Message from 'You' -->
<div class="flex flex-col items-end max-w-[80%] ml-auto">
<span class="font-headline text-[0.65rem] font-bold text-white mb-1 mr-2 opacity-80">You</span>
<div class="bg-primary/90 backdrop-blur-md px-4 py-3 rounded-2xl rounded-br-none shadow-sm text-white">
<p class="text-sm font-body leading-relaxed">Sure, sharing my screen now.</p>
</div>
</div>
<!-- Message from other person -->
<div class="flex flex-col items-start max-w-[80%]">
<span class="font-headline text-[0.65rem] font-bold text-white mb-1 ml-2 opacity-80">Sarah</span>
<div class="glass-panel px-4 py-3 rounded-2xl rounded-bl-none shadow-sm">
<p class="text-sm font-body leading-relaxed">That interaction looks much smoother than last week's version! 🚀</p>
</div>
</div>
</div>
<!-- Compact Message Input -->
<div class="mt-4 pointer-events-auto">
<div class="glass-panel flex items-center gap-2 p-1.5 rounded-2xl shadow-lg ring-1 ring-white/20">
<input class="flex-1 bg-transparent border-none focus:ring-0 text-sm font-body placeholder:text-on-surface/50 px-3" placeholder="Message..." type="text"/>
<button class="bg-primary text-white p-2 rounded-xl flex items-center justify-center hover:brightness-110 transition-all active:scale-95 shadow-md">
<span class="material-symbols-outlined text-[20px]" data-icon="send">send</span>
</button>
</div>
</div>
</div>
<!-- Picture-in-Picture (Self Feed) -->
<div class="fixed bottom-36 right-6 z-40">
<div class="w-28 h-40 rounded-xl overflow-hidden shadow-2xl ring-4 ring-white/20 transition-all hover:scale-105 group">
<img class="w-full h-full object-cover" data-alt="Front facing camera view of a man in a modern office space, bright natural lighting, soft background blur" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdNCpHg7zIcwgc34Dde8OEo5NhbS-3I6Xm-lqwZapiMPwuN5HVlED4igLh2e6fZHq9M6KMkBREvcILq7Fr2iAAlPS-Wg45kBkh8XvFRnKz-tXPPIUPIiv8aZ_-lZooeKMWRWieu3B_ELWKa8Wpo86z4K60ehNOK5pPAWixVTuPbNrTDvMcpfjcVDQWnyZuGqggZMbLQ6B3ya2CfSXpCFnH0ckKpuiTWHc2vQsszmrbF4scYDTJVqV2-VzpjlxaBphqlrfhl0GtVE31"/>
<div class="absolute bottom-2 left-2 glass-panel px-2 py-0.5 rounded-lg">
<p class="font-label text-[0.6rem] font-bold text-on-surface tracking-tighter">You</p>
</div>
<div class="absolute inset-0 bg-primary/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
<span class="material-symbols-outlined text-white" data-icon="drag_indicator">drag_indicator</span>
</div>
</div>
</div>
<!-- Main Control Bar -->
<div class="fixed bottom-8 left-0 right-0 flex justify-center items-center z-50">
<div class="glass-panel rounded-full px-6 py-4 flex items-center gap-4 shadow-[0px_12px_32px_rgba(42,52,57,0.2)]">
<!-- Mute Toggle -->
<button class="text-on-surface hover:bg-surface-container-highest/50 p-3 rounded-full transition-all active:scale-90 duration-150 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="mic">mic</span>
</button>
<!-- Video Toggle -->
<button class="text-on-surface hover:bg-surface-container-highest/50 p-3 rounded-full transition-all active:scale-90 duration-150 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="videocam">videocam</span>
</button>
<!-- End Call -->
<button class="bg-error text-white p-4 rounded-full scale-110 shadow-lg hover:brightness-110 active:scale-95 transition-all flex items-center justify-center">
<span class="material-symbols-outlined font-bold" data-icon="call_end" style="font-variation-settings: 'FILL' 1;">call_end</span>

<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</div>
</div>
<!-- Active Speaker Subtle Glow -->
<div class="fixed inset-0 pointer-events-none ring-[12px] ring-primary/10 rounded-[2.5rem] md:rounded-[4rem] z-10 opacity-60"></div>

<div class="fixed right-8 top-1/3 flex-col gap-4 hidden lg:flex z-40">
<div class="glass-panel w-16 h-16 rounded-xl overflow-hidden shadow-md group cursor-pointer hover:ring-2 ring-primary transition-all">

</div>
<div class="glass-panel w-16 h-16 rounded-xl overflow-hidden shadow-md group cursor-pointer hover:ring-2 ring-primary transition-all">
<img class="w-full h-full object-cover" data-alt="Portrait avatar of a creative professional woman, colorful lighting, high resolution" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCR7syYSzVUjdVkycPT2QGI3ofALlPbtVjJmRAd5uJwVdCP7Wj6x3Ei22sZcVsDkul4ZgUFgMIyBz_Had65gfqFsobYhssmoBQD_wk2BKnzPqP0c7XgFz1OE0VDRSbCWN0Pz66Wr0y2mfWjux69GzGjGK1oPW4uvXBmJovX0z29UQOvXxtWx9lbVTkB5YMctBN5cP0gMp78pJpf219_csA8myQMup1n_2_fe0LD1rX10DGgfKelYocuwPKGEq2eYq0QPc5xtvLButP4"/>

<div class="glass-panel w-16 h-16 rounded-xl flex items-center justify-center shadow-md cursor-pointer hover:bg-white transition-all">
