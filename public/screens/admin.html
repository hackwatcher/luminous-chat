<!-- Admin Control Panel – System Nexus -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 no-border bg-gradient-to-b from-background to-transparent reveal-1">
    <button id="admin-back-btn" class="material-symbols-outlined text-on-surface/50 hover:text-white transition-colors">arrow_back</button>
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">admin_panel_settings</span>
        <h1 class="text-xl font-bold text-on-surface font-headline">System Nexus</h1>
    </div>
    <div class="w-10"></div>
</header>

<main class="pt-24 pb-32 px-6 overflow-y-auto h-screen hide-scrollbar reveal-2">
    <!-- Admin Hero -->
    <div class="mb-10 p-8 glass-card rounded-[2.5rem] border-primary/20 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-primary/10 rounded-full blur-3xl"></div>
        <div class="relative z-10">
            <h2 class="text-3xl font-black font-headline tracking-tighter mb-2">Welcome, Admin</h2>
            <p class="text-on-surface/50 text-xs uppercase tracking-widest font-bold">Luminous Operations • 2026</p>
        </div>
    </div>

    <!-- Analytics Grid -->
    <div class="grid grid-cols-2 gap-4 mb-10">
        <div class="glass-card p-6 rounded-[2rem] border-white/5">
            <span class="text-[10px] font-black opacity-30 uppercase tracking-widest">Total Users</span>
            <div class="text-2xl font-black mt-1">12,842</div>
            <div class="text-[10px] text-green-400 font-bold mt-1">+14% ↑</div>
        </div>
        <div class="glass-card p-6 rounded-[2rem] border-white/5">
            <span class="text-[10px] font-black opacity-30 uppercase tracking-widest">Matches Today</span>
            <div class="text-2xl font-black mt-1">1,402</div>
            <div class="text-[10px] text-primary font-bold mt-1">82% Match Rate</div>
        </div>
        <div class="glass-card p-6 rounded-[2rem] border-white/5">
            <span class="text-[10px] font-black opacity-30 uppercase tracking-widest">Active Live</span>
            <div class="text-2xl font-black mt-1">542</div>
            <div class="flex items-center gap-1 mt-1">
                <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-[10px] opacity-40">Live Rooms</span>
            </div>
        </div>
        <div class="glass-card p-6 rounded-[2rem] border-white/5">
            <span class="text-[10px] font-black opacity-30 uppercase tracking-widest">Revenue</span>
            <div class="text-2xl font-black mt-1">$41.2k</div>
            <div class="text-[10px] text-primary font-bold mt-1">Plus Uplift 32%</div>
        </div>
    </div>

    <!-- Live Moderation Queue -->
    <section class="space-y-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold font-headline">Live Moderation</h3>
            <span class="text-xs bg-red-400/20 text-red-400 px-3 py-1 rounded-full font-black uppercase tracking-tighter animate-pulse">Live</span>
        </div>
        
        <div id="admin-user-list" class="space-y-3">
             <!-- Mock users will be injected -->
             <div class="glass-effect p-4 rounded-3xl border border-white/5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-2xl bg-surface flex items-center justify-center">
                        <span class="material-symbols-outlined text-on-surface/20">person</span>
                    </div>
                    <div>
                        <p class="text-sm font-bold">User_Anon_9281</p>
                        <p class="text-[10px] opacity-40 uppercase">Reporting Count: 0</p>
                    </div>
                </div>
                <button class="bg-red-500/10 text-red-500 text-[10px] font-black px-4 py-2 rounded-xl hover:bg-red-500 hover:text-white transition-all">BAN</button>
             </div>
        </div>
    </section>
</main>
