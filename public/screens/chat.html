<!-- Chat / Live Room Screen -->
<main class="h-screen w-full flex flex-col bg-background relative overflow-hidden">
    <!-- Main Video Canvas -->
    <div id="remote-video-container" class="flex-grow relative bg-slate-900 overflow-hidden">
        <!-- Placeholder for remote video -->
        <div class="absolute inset-0 flex items-center justify-center text-gray-500 italic text-sm">Waiting for partner...</div>
    </div>

    <!-- Self Preview Overlay -->
    <div id="local-video-container" class="absolute top-6 right-6 w-32 aspect-[3/4] rounded-2xl overflow-hidden border-2 border-primary shadow-2xl z-20 bg-black">
        <!-- Local video will be injected here -->
    </div>

    <!-- Chat Overlay (Glass) -->
    <div class="absolute bottom-32 left-0 w-full px-6 z-30 pointer-events-none">
        <!-- Video Filters Row -->
        <div id="chat-filters" class="flex gap-4 overflow-x-auto pb-6 hide-scrollbar pointer-events-auto reveal-1">
            <button data-filter="none" class="filter-btn group flex flex-col items-center gap-1 active:scale-90 transition-all">
                <div class="w-12 h-12 rounded-full border-2 border-primary bg-background overflow-hidden p-1 group-hover:shadow-[0_0_15px_rgba(99,102,241,0.5)]">
                    <div class="w-full h-full rounded-full bg-slate-500"></div>
                </div>
                <span class="text-[10px] text-white/50 uppercase font-black tracking-tighter">Normal</span>
            </button>
            <button data-filter="sepia(0.8)" class="filter-btn group flex flex-col items-center gap-1 active:scale-90 transition-all">
                <div class="w-12 h-12 rounded-full border-2 border-transparent bg-background overflow-hidden p-1 group-hover:border-primary">
                    <div class="w-full h-full rounded-full bg-[#704214]"></div>
                </div>
                <span class="text-[10px] text-white/50 uppercase font-black tracking-tighter">Sepia</span>
            </button>
            <button data-filter="grayscale(1)" class="filter-btn group flex flex-col items-center gap-1 active:scale-90 transition-all">
                <div class="w-12 h-12 rounded-full border-2 border-transparent bg-background overflow-hidden p-1 group-hover:border-primary">
                    <div class="w-full h-full rounded-full bg-gray-500"></div>
                </div>
                <span class="text-[10px] text-white/50 uppercase font-black tracking-tighter">B&W</span>
            </button>
            <button data-filter="brightness(1.2) saturate(1.5) blur(0.5px)" class="filter-btn group flex flex-col items-center gap-1 active:scale-90 transition-all">
                <div class="w-12 h-12 rounded-full border-2 border-transparent bg-background overflow-hidden p-1 group-hover:border-primary">
                    <div class="w-full h-full rounded-full bg-orange-200"></div>
                </div>
                <span class="text-[10px] text-white/50 uppercase font-black tracking-tighter">Bloom</span>
            </button>
            <button data-filter="hue-rotate(180deg) saturate(1.2)" class="filter-btn group flex flex-col items-center gap-1 active:scale-90 transition-all">
                <div class="w-12 h-12 rounded-full border-2 border-transparent bg-background overflow-hidden p-1 group-hover:border-primary">
                    <div class="w-full h-full rounded-full bg-cyan-500"></div>
                </div>
                <span class="text-[10px] text-white/50 uppercase font-black tracking-tighter">Cold</span>
            </button>
        </div>

        <div id="chat-messages" class="max-h-64 overflow-y-auto flex flex-col gap-3 pointer-events-auto hide-scrollbar pb-4">
            <!-- Messages go here -->
        </div>
    </div>

    <!-- Controls & Input -->
    <div class="absolute bottom-0 left-0 w-full z-40 bg-gradient-to-t from-background via-background/80 to-transparent pt-10 pb-10 px-6">
        <div class="flex items-center gap-3 mb-6">
            <button id="chat-toggle-mic" class="w-14 h-14 rounded-full bg-surface border border-outline/10 flex items-center justify-center text-on-surface active:scale-90 transition-all">
                <span class="material-symbols-outlined">mic</span>
            </button>
            <button id="chat-toggle-video" class="w-14 h-14 rounded-full bg-surface border border-outline/10 flex items-center justify-center text-on-surface active:scale-90 transition-all">
                <span class="material-symbols-outlined">videocam</span>
            </button>
            <button id="chat-next-btn" class="flex-grow h-14 rounded-full bg-surface border border-outline/10 flex items-center justify-center gap-2 text-on-surface font-bold tracking-widest uppercase text-xs active:scale-95 transition-all">
                <span>Next Person</span>
                <span class="material-symbols-outlined">skip_next</span>
            </button>
        </div>

        <form id="chat-form" class="relative group">
            <input id="chat-input" type="text" placeholder="Type a message..." class="w-full bg-surface border border-outline/10 rounded-full py-4 px-6 text-on-surface placeholder-on-surface/40 focus:ring-2 focus:ring-primary transition-all"/>
            <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full primary-gradient flex items-center justify-center text-white">
                <span class="material-symbols-outlined text-sm">send</span>
            </button>
        </form>
    </div>
</main>
