<main class="h-screen w-full flex flex-col items-center justify-center relative overflow-hidden bg-background">
    <!-- Content -->
    <div class="z-10 w-full max-w-sm px-8 flex flex-col items-center">
        <!-- Brand -->
        <div class="mb-12 text-center reveal-1">
            <h1 class="text-4xl font-black tracking-tighter text-on-surface font-headline">Join Luminous</h1>
            <p class="text-slate-400 text-sm mt-3">Personalize your matches and unlock premium features.</p>
        </div>

        <!-- Auth Buttons -->
        <div id="auth-main-options" class="w-full space-y-4 mb-10 reveal-2">
            <!-- Email -->
            <button id="auth-email-btn" class="w-full py-4 px-6 rounded-2xl primary-gradient flex items-center justify-center gap-4 hover:shadow-[0_10px_30px_var(--primary-glow)] active:scale-95 transition-all group">
                <span class="material-symbols-outlined text-white">mail</span>
                <span class="text-white font-semibold text-sm">Continue with Email</span>
            </button>

            <div class="flex items-center gap-4 py-2">
                <div class="h-px bg-white/10 flex-grow"></div>
                <span class="text-[10px] text-white/30 uppercase font-bold tracking-widest">or</span>
                <div class="h-px bg-white/10 flex-grow"></div>
            </div>

            <!-- Socials -->
            <button id="auth-google-btn" class="w-full py-4 px-6 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center gap-4 hover:bg-white/10 active:scale-95 transition-all group">
                <span class="material-symbols-outlined text-primary">login</span>
                <span class="text-white font-semibold text-sm">Google</span>
            </button>

            <div class="grid grid-cols-2 gap-4">
                <button id="auth-facebook-btn" class="py-4 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 active:scale-95 transition-all group">
                    <span class="material-symbols-outlined text-[#1877F2]">facebook</span>
                </button>
                <button id="auth-phone-btn" class="py-4 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 active:scale-95 transition-all group">
                    <span class="material-symbols-outlined text-accent">phone_iphone</span>
                </button>
            </div>
        </div>

        <!-- Email Auth Form (Hidden initially) -->
        <div id="email-auth-container" class="w-full hidden reveal-2">
            <button id="email-auth-back" class="mb-6 flex items-center gap-2 text-on-surface/50 hover:text-white transition-colors">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                <span class="text-xs font-bold uppercase tracking-widest">Back</span>
            </button>

            <form id="email-auth-form" class="space-y-4">
                <h2 id="email-form-title" class="text-xl font-bold mb-6">Create Account</h2>
                
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-black opacity-40 ml-2">Email Address</label>
                    <input type="email" id="auth-email-input" placeholder="name@example.com" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white focus:ring-2 focus:ring-primary transition-all" required/>
                </div>

                <div class="space-y-2 pb-4">
                    <label class="text-[10px] uppercase font-black opacity-40 ml-2">Password</label>
                    <input type="password" id="auth-password-input" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white focus:ring-2 focus:ring-primary transition-all" required/>
                </div>

                <button type="submit" id="email-auth-submit" class="w-full py-4 primary-gradient rounded-full text-white font-black shadow-lg">
                    Sign Up
                </button>

                <p class="text-center pt-4">
                    <button type="button" id="email-form-toggle" class="text-xs text-on-surface/50 hover:text-primary transition-colors">
                        Already have an account? <span class="font-bold text-primary">Login</span>
                    </button>
                </p>
            </form>
        </div>

        <!-- Optional Link -->
        <button id="auth-skip-btn" class="text-on-surface/50 font-bold text-xs hover:text-white tracking-widest uppercase transition-colors reveal-3">
            Skip for now (Guest)
        </button>

        <p class="mt-12 text-[10px] text-gray-500 text-center leading-relaxed">
            By continuing, you agree to our <br> 
            <span class="text-white/40">Terms of Service</span> & <span class="text-white/40">Privacy Policy</span>
        </p>
    </div>
</main>
