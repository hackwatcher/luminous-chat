<!-- Matching Screen -->
<main class="h-screen w-full flex flex-col items-center justify-center relative overflow-hidden bg-background">
    <!-- Pulsing Background -->
    <div class="absolute inset-0 z-0">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] aspect-square bg-primary/10 rounded-full animate-ping opacity-20"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[100%] aspect-square bg-primary/10 rounded-full animate-ping delay-700 opacity-20"></div>
    </div>

    <!-- Center Visual -->
    <div class="z-10 flex flex-col items-center text-center px-10">
        <div class="relative mb-12">
            <div class="w-24 h-24 rounded-full primary-gradient flex items-center justify-center shadow-[0_0_50px_rgba(186,158,255,0.4)]">
                <span class="material-symbols-outlined text-white text-5xl animate-pulse">videocam</span>
            </div>
            <!-- Radar Ring -->
            <div class="absolute inset-0 rounded-full border border-primary/40 animate-ping"></div>
        </div>

        <h1 class="text-4xl font-extrabold tracking-tight text-on-surface mb-4 font-headline">Finding Match...</h1>
        <p class="text-gray-400 font-body mb-12 max-w-xs">Connecting you to someone luminous around the world.</p>

        <!-- Preferences Summary -->
        <div class="flex gap-2 mb-16">
            <span class="px-4 py-2 bg-surface-container rounded-full text-xs font-bold text-gray-500 uppercase tracking-widest border border-white/5">Global</span>
            <span class="px-4 py-2 bg-surface-container rounded-full text-xs font-bold text-gray-500 uppercase tracking-widest border border-white/5">Video On</span>
        </div>

        <!-- Stop Button -->
        <button id="stop-search-btn" class="px-10 py-4 rounded-full bg-red-500/10 text-red-500 font-bold border border-red-500/20 hover:bg-red-500/20 active:scale-95 transition-all">
            Cancel Search
        </button>
    </div>

    <!-- Decorative Bottom Text -->
    <div class="absolute bottom-12 flex items-center gap-2 opacity-30">
        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
        <span class="text-[10px] font-bold uppercase tracking-widest">1,240 People Online</span>
    </div>
</main>
