<!-- Discover / Swipe Screen -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 no-border bg-gradient-to-b from-background to-transparent reveal-1">
    <div class="flex items-center gap-3">
        <div data-nav="profile" class="w-10 h-10 rounded-full border-2 border-primary/30 p-0.5 cursor-pointer">
            <img id="nav-profile-img" alt="User Profile" class="w-full h-full rounded-full object-cover" src="">
        </div>
        <div class="flex flex-col">
            <span id="nav-user-name" class="text-xs font-black uppercase tracking-widest text-primary">Guest</span>
            <h1 class="text-2xl font-bold tracking-tighter text-on-surface font-headline leading-none">Luminous</h1>
        </div>
    </div>
    <div class="flex items-center gap-3">
        <button id="nav-filter-btn" class="material-symbols-outlined text-slate-400 hover:text-white transition-colors scale-110 active:scale-90 mr-2">tune</button>
        <button id="nav-settings-btn" class="material-symbols-outlined text-slate-400 hover:text-white transition-colors scale-110 active:scale-90">settings</button>
    </div>
</header>

<main class="min-h-screen pt-12 pb-32 px-4 flex flex-col items-center justify-center overflow-hidden bg-background">
    <!-- Discover Deck -->
    <div id="swipe-deck" class="relative w-full max-w-sm aspect-[3/4.5] reveal-2"></div>

    <div id="deck-empty" class="absolute inset-0 hidden flex flex-col items-center justify-center text-center px-10">
        <span class="material-symbols-outlined text-7xl text-on-surface/10 mb-6">dynamic_feed</span>
        <h3 class="text-xl font-bold opacity-40">That's everyone for now!</h3>
        <p class="text-sm opacity-30 mt-2">Try changing your filters to see more profiles.</p>
    </div>

    <!-- Filter Modal -->
    <div id="filter-modal" class="fixed inset-0 z-[60] hidden flex items-end justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="w-full max-w-sm glass-card rounded-[2.5rem] p-8 relative overflow-hidden transition-all duration-500 transform translate-y-full">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-bold font-headline">Filters</h3>
                <button id="close-filter-btn" class="material-symbols-outlined text-on-surface/50">close</button>
            </div>

            <div class="space-y-8">
                <div>
                    <div class="flex justify-between mb-4">
                        <span class="text-sm font-bold opacity-50 uppercase tracking-widest">Max Age</span>
                        <span id="filter-age-val" class="text-primary font-bold">45</span>
                    </div>
                    <input type="range" id="filter-age-range" min="18" max="70" value="45" class="w-full h-1.5 bg-surface rounded-full appearance-none cursor-pointer accent-primary">
                </div>

                <div>
                    <span class="text-sm font-bold opacity-50 uppercase tracking-widest block mb-4">Focus Interests</span>
                    <div id="filter-tags-cloud" class="flex flex-wrap gap-2">
                        <!-- Dynamic tags -->
                    </div>
                </div>

                <button id="apply-filters-btn" class="w-full py-4 primary-gradient rounded-full text-white font-black shadow-lg">SHOW RESULTS</button>
            </div>
        </div>
    </div>
</main>
