<!-- History Screen -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 no-border bg-gradient-to-b from-[#050f1c] to-transparent">
    <div class="flex items-center gap-3">
        <h1 class="text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-[#ba9eff] to-[#ff97b5] font-headline">History</h1>
    </div>
</header>

<main class="pt-24 pb-32 px-6 overflow-y-auto h-screen hide-scrollbar">
    <div class="mb-10 text-on-surface">
        <h2 class="text-4xl font-extrabold tracking-tight mb-2">Recent</h2>
        <p class="text-gray-400 font-body">Your recent luminous connections</p>
    </div>

    <div id="history-list" class="space-y-4">
        <div id="history-empty" class="hidden flex flex-col items-center justify-center py-20 text-gray-500">
            <span class="material-symbols-outlined text-6xl mb-4">history</span>
            <p>No history yet.</p>
        </div>
    </div>
</main>
