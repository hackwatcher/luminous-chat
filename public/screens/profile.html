<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#ffc885",
                        "secondary-dim": "#e79400",

                        "on-primary-fixed-variant": "#370086",
                        "on-secondary": "#4a2c00",
                        "inverse-primary": "#6e3bd7",
                        "on-primary-fixed": "#000000",
                        "secondary": "#f8a010",
                        "on-error-container": "#ffb2b9",
                        "on-tertiary-fixed": "#380018",
                        "on-primary": "#39008c",
                        "surface-dim": "#050f1c",
                        "surface-tint": "#ba9eff",
                        "surface-container-lowest": "#000000",
                        "surface-variant": "#18263a",
                        "surface-container-highest": "#18263a",
                        "outline": "#6c7687",
                        "on-surface": "#dce6f9",
                        "tertiary-dim": "#f0779d",
                        "error-dim": "#d73357",
                        "error": "#ff6e84",
                        "primary-dim": "#8455ef",
                        "tertiary-container": "#fd81a8",
                        "on-secondary-container": "#fff6f0",
                        "on-surface-variant": "#a1acbe",
                        "tertiary-fixed": "#ff8eb0",
                        "inverse-surface": "#f8f9ff",
                        "secondary-container": "#855300",
                        "on-secondary-fixed": "#4c2e00",
                        "on-background": "#dce6f9",

                        "surface": "#050f1c",

                        "background": "#050f1c",
                        "on-tertiary-fixed-variant": "#701039",
                        "surface-container-high": "#122032",
                        "on-error": "#490013",
                        "outline-variant": "#3e4958",
                        "primary-fixed": "#ae8dff",
                        "secondary-fixed-dim": "#ffb554",
                        "inverse-on-surface": "#4c5665",

                    "borderRadius": {

                        "label": ["Inter"]

            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 w-full bg-gradient-to-b from-[#050f1c] to-transparent">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface hover:opacity-80 transition-opacity active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-[#ba9eff] to-[#ff97b5]">Pulse</h1>
</div>
<button class="px-6 py-2 rounded-full bg-gradient-to-br from-primary to-primary-dim text-on-primary font-headline font-bold text-sm tracking-tight active:scale-95 transition-transform">
            Save
        </button>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Photo Section: Asymmetric Layout -->
<section class="mb-12">
<div class="flex items-baseline justify-between mb-6">
<h2 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">Your Vibe</h2>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">4 / 6 Photos</span>
</div>
<div class="grid grid-cols-6 grid-rows-2 gap-4 h-[400px]">
<!-- Main Photo -->
<div class="col-span-4 row-span-2 relative group overflow-hidden rounded-xl">
<img alt="Main Profile" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" data-alt="Close-up portrait of a stylish young person with neon lighting reflecting on their face, high-fashion editorial aesthetic, nocturnal mood" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAIdjo8o3X9yCmLdlZUZOwO0a_jI8fU7EHZXAwGjiFol-M6bPNT4isLGkNpsewheFHZSxlA9CANSWXmSD3BBmrelexX8aYElzlDGb0S3wLsVFvbxdwyFpDvIe2T2MtCALWtZp-i_UldOwEiDKvzPBgh2OeVCWdwXCWfVy4mqAla1AkQnrd1z9DAv_vFiW6gCqHXd5wcvCdmegs5rdRPVfljJ22X-f6xexOn_mOKuOjEDPjKkwSoyKnfTYxgPwerNuW9njO6tvhf-T0d"/>
<div class="absolute inset-0 bg-gradient-to-t from-background/60 to-transparent"></div>
<button class="absolute top-4 right-4 bg-surface-container/70 backdrop-blur-md p-2 rounded-full text-primary shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="edit">edit</span>
</button>
</div>
<!-- Secondary Photo -->
<div class="col-span-2 row-span-1 relative group overflow-hidden rounded-xl">
<img alt="Second Photo" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" data-alt="Candid full body shot of person standing in front of a colorful graffiti wall at dusk, streetwear style, energetic vibe" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCw-_itpWHoENeHav99xozQjpHiL298p6R4gvXHKbH0hIiUzmaIrJPzUwYUTZ0DVxUxGRwEOAoq1_oYXvEzHKF_lbrrano_nuwfQAmAVCnoTmDM1og-mwRK4h-10kn-VCb-sHwBbFYnbpY_2Pv8W4H_ow7YWhgBIwHKKPUxbwz3QEcHPCzYX3Bdm9JAPfH6dJ8CBn81ao8_UyTvvxG3u4Hh1mwmSPK4f5kIhqAmYQ7YqHebFHOBUB6znuLea6rUltHgO3FR-cXlLcmP"/>
<button class="absolute top-2 right-2 bg-surface-container/70 backdrop-blur-md p-1.5 rounded-full text-error active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="close" style="font-size: 18px;">close</span>
</button>
</div>
<!-- Add Button -->
<div class="col-span-2 row-span-1 border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center gap-2 bg-surface-container-low hover:bg-surface-container-high transition-colors cursor-pointer group">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="add_a_photo">add_a_photo</span>
</div>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Add More</span>
</div>
</div>
</section>
<!-- Bio Section -->
<section class="mb-12">
<div class="flex items-center gap-3 mb-4">
<div class="w-1 h-6 bg-secondary rounded-full"></div>
<h2 class="font-headline text-xl font-bold text-on-surface">Bio</h2>
</div>
<div class="relative">
<textarea class="w-full min-h-[120px] bg-surface-container-high border-none rounded-lg p-6 font-body text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-primary/50 transition-all resize-none" placeholder="Tell your story...">Digital architect by day, urban explorer by night. Looking for someone who appreciates late-night vinyl sessions and rooftop cocktails. 🍸✨</textarea>
<div class="absolute bottom-4 right-4 font-label text-[10px] text-on-surface-variant/50">132 / 300</div>
</div>
</section>
<!-- Interests Section -->
<section class="mb-12">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-3">
<div class="w-1 h-6 bg-tertiary rounded-full"></div>
<h2 class="font-headline text-xl font-bold text-on-surface">Interests</h2>
</div>
<button class="text-primary font-label text-[10px] uppercase tracking-widest hover:underline transition-all">See All</button>
</div>
<div class="flex overflow-x-auto gap-3 pb-4 hide-scrollbar snap-x">
<!-- Interest Chips -->
<div class="flex-none snap-start px-6 py-2.5 bg-gradient-to-br from-primary/20 to-primary-dim/20 border border-primary/30 rounded-md flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm" data-icon="music_note">music_note</span>
<span class="font-body text-sm font-semibold text-primary">Music</span>
</div>
<div class="flex-none snap-start px-6 py-2.5 bg-surface-variant rounded-md flex items-center gap-2 hover:bg-surface-bright transition-colors cursor-pointer">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="sports_esports">sports_esports</span>
<span class="font-body text-sm text-on-surface">Gaming</span>
</div>
<div class="flex-none snap-start px-6 py-2.5 bg-surface-variant rounded-md flex items-center gap-2 hover:bg-surface-bright transition-colors cursor-pointer">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="flight">flight</span>
<span class="font-body text-sm text-on-surface">Travel</span>
</div>
<div class="flex-none snap-start px-6 py-2.5 bg-surface-variant rounded-md flex items-center gap-2 hover:bg-surface-bright transition-colors cursor-pointer">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="restaurant">restaurant</span>
<span class="font-body text-sm text-on-surface">Foodie</span>
</div>
<div class="flex-none snap-start px-6 py-2.5 bg-surface-variant rounded-md flex items-center gap-2 hover:bg-surface-bright transition-colors cursor-pointer">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="palette">palette</span>
<span class="font-body text-sm text-on-surface">Art</span>
</div>
<div class="flex-none snap-start px-4 py-2.5 bg-surface-container-highest border border-outline-variant/30 rounded-md flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="add">add</span>
</div>
</div>
</section>
<!-- Advanced Details (Bento-ish) -->
<section class="grid grid-cols-2 gap-4">
<div class="p-6 bg-surface-container rounded-xl flex flex-col gap-1 border border-outline-variant/10">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Location</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="location_on">location_on</span>
<span class="font-headline font-bold text-lg">London, UK</span>
</div>
</div>
<div class="p-6 bg-surface-container rounded-xl flex flex-col gap-1 border border-outline-variant/10">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Occupation</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary" data-icon="work">work</span>
<span class="font-headline font-bold text-lg">UX Designer</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<!-- Bottom Navigation Standardized -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-[#050f1c]/70 backdrop-blur-xl rounded-t-[3rem] shadow-[0_-8px_30px_rgba(110,59,215,0.1)]">
    <button class="flex flex-col items-center justify-center text-slate-500 p-4 hover:text-[#ba9eff] transition-colors scale-110 duration-300 ease-out">
        <span class="material-symbols-outlined" data-icon="style">style</span>
    </button>
    <button class="flex flex-col items-center justify-center bg-gradient-to-br from-[#ba9eff] to-[#6e3bd7] text-white rounded-full p-4 shadow-[0_0_20px_rgba(186,158,255,0.4)] scale-110 duration-300 ease-out">
        <span class="material-symbols-outlined" data-icon="videocam" style="font-variation-settings: 'FILL' 1;">videocam</span>
    </button>
    <button class="flex flex-col items-center justify-center text-slate-500 p-4 hover:text-[#ba9eff] transition-colors scale-110 duration-300 ease-out">
        <span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
    </button>
</nav>
<!-- Live Pulse Floating Indicator (Visual Flair) -->
<div class="fixed top-24 right-4 flex items-center gap-2 bg-surface-container/40 backdrop-blur-sm px-3 py-1.5 rounded-full">
<div class="relative w-2 h-2">
<div class="absolute inset-0 bg-secondary rounded-full animate-ping opacity-75"></div>
<div class="relative bg-secondary w-2 h-2 rounded-full"></div>
</div>
<span class="font-label text-[10px] uppercase tracking-widest text-secondary font-bold">Online Now</span>
</div>
</body></html>
