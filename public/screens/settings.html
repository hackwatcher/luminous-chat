<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 no-border bg-gradient-to-b from-background to-transparent reveal-1">
    <button id="settings-back-btn" class="material-symbols-outlined text-slate-400 hover:text-white transition-colors">arrow_back</button>
    <h1 class="text-xl font-bold text-white font-headline">Settings</h1>
    <div class="w-10"></div>
</header>

<main class="pt-24 pb-32 px-6 overflow-y-auto h-screen hide-scrollbar reveal-2">
    <div class="space-y-4">
        <!-- Premium Promo -->
        <button id="go-premium-btn" class="w-full p-6 primary-gradient rounded-3xl flex items-center justify-between shadow-[0_15px_30px_var(--primary-glow)] group overflow-hidden relative">
            <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <div class="flex items-center gap-4 relative z-10">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                    <span class="material-symbols-outlined text-white">workspace_premium</span>
                </div>
                <div class="text-left">
                    <p class="text-white font-bold">Get Luminous Plus</p>
                    <p class="text-white/60 text-[10px] uppercase font-black">All features unlocked</p>
                </div>
            </div>
            <span class="material-symbols-outlined text-white relative z-10">chevron_right</span>
        </button>

        <section class="glass-effect rounded-3xl p-2 border border-white/5">
            <div class="p-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary">notifications</span>
                    <span class="text-on-surface font-medium">Notifications</span>
                </div>
                <button id="setting-notifications" class="w-12 h-6 bg-white/10 rounded-full relative p-1 shadow-inner transition-colors">
                    <div class="dot w-4 h-4 bg-white rounded-full transition-transform"></div>
                </button>
            </div>
            <div class="p-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary">dark_mode</span>
                    <span class="text-on-surface font-medium">Dark Mode</span>
                </div>
                <button id="setting-darkmode" class="w-12 h-6 bg-primary rounded-full relative p-1 shadow-inner transition-colors">
                    <div class="dot w-4 h-4 bg-white rounded-full translate-x-6 transition-transform"></div>
                </button>
            </div>
        </section>

        <section class="bg-surface-container rounded-3xl p-2">
            <button class="w-full p-4 flex items-center gap-3 text-on-surface hover:bg-white/5 transition-colors">
                <span class="material-symbols-outlined">security</span>
                <span>Privacy & Safety</span>
            </button>
            <button class="w-full p-4 flex items-center gap-3 text-on-surface hover:bg-white/5 transition-colors">
                <span class="material-symbols-outlined">help</span>
                <span>Help Center</span>
            </button>
        </section>

        <button id="logout-btn" class="w-full py-4 mt-10 rounded-2xl bg-red-500/10 text-red-500 font-bold hover:bg-red-500/20 transition-all">
            Log Out
        </button>
    </div>
</main>
