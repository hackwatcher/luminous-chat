<!-- Message Detail (Direct Message) Screen -->
<header class="fixed top-0 w-full z-50 flex items-center gap-3 px-6 py-4 no-border bg-gradient-to-b from-[#050f1c] to-transparent">
    <button id="chat-detail-back-btn" class="material-symbols-outlined text-slate-400 active:scale-90 transition-transform">arrow_back</button>
    
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full border-2 border-primary/30 p-0.5">
            <img id="chat-detail-avatar" class="w-full h-full rounded-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAD7G45XMQSA4NM64MwFNLpCHQiLl4aAb3-7z7_BrNRPqTt5ZEcCl8vrh3NHEgaPYpZyhTHgu7FtAAoIKp_aGrLTDTB5HKvu1jFYL6Oyaf3741voYn57OJAepVWKH9yPtMKQhyCWNjmmqg592DhQeJereErwkK6lFZAJgOGiBG-ZLuLUfsUIdywQNAZAv5i7dVHY9hjMhVevXIo7QPvD8KKNLRtGMTxxk1r0w8FBD93PF33Ii0c11-ovOWfpovnaJ62CsEuNZ9fzQnv"/>
        </div>
        <div>
            <h2 id="chat-detail-name" class="text-white font-bold text-sm">Maya</h2>
            <div class="flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Online</span>
            </div>
        </div>
    </div>

    <div class="flex-grow"></div>
    
    <button class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-primary active:scale-90 transition-transform">
        <span class="material-symbols-outlined">videocam</span>
    </button>
</header>

<main id="chat-detail-messages" class="pt-24 pb-32 px-6 overflow-y-auto h-screen hide-scrollbar flex flex-col gap-4">
    <!-- Messages will be injected here -->
</main>

<!-- Bottom Input Area -->
<div class="fixed bottom-0 left-0 w-full z-50 px-6 pb-10 pt-4 bg-gradient-to-t from-[#050f1c] to-transparent">
    <form id="chat-detail-form" class="relative group">
        <input id="chat-detail-input" type="text" placeholder="Type a message..." class="w-full bg-white/10 backdrop-blur-md border border-white/10 rounded-full py-4 pl-6 pr-14 text-white placeholder-white/40 focus:ring-2 focus:ring-primary transition-all"/>
        <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full primary-gradient flex items-center justify-center text-white active:scale-90 transition-all">
            <span class="material-symbols-outlined text-sm">send</span>
        </button>
    </form>
</div>
