<!-- Onboarding / Profile Setup Screen -->
<main class="h-screen w-full flex flex-col items-center justify-start pt-20 px-8 relative overflow-hidden">
    <!-- Progress Indicator -->
    <div class="fixed top-12 left-0 w-full px-12 z-50 reveal-1">
        <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden">
            <div id="onboarding-progress" class="h-full primary-gradient transition-all duration-500" style="width: 25%"></div>
        </div>
        <div class="flex justify-between mt-3 text-[10px] uppercase tracking-widest font-black text-slate-500">
            <span>Step <span id="current-step-num">1</span> of 4</span>
            <span id="step-title">Welcome</span>
        </div>
    </div>

    <!-- Step Container -->
    <div id="onboarding-step-container" class="w-full max-w-md mt-10">
        <!-- Steps will be injected here -->
    </div>

    <!-- Navigation Buttons -->
    <div class="fixed bottom-12 left-0 w-full px-8 flex gap-4 reveal-3">
        <button id="onboarding-back-btn" class="hidden flex-1 py-5 rounded-2xl bg-white/5 border border-white/10 text-white font-bold transition-all active:scale-95">Back</button>
        <button id="onboarding-next-btn" class="flex-[2] py-5 rounded-2xl primary-gradient text-white font-bold shadow-2xl transition-all active:scale-95">Continue</button>
    </div>
</main>

<template id="step-1">
    <div class="reveal-2">
        <h1 class="text-4xl font-black tracking-tighter text-white mb-2 font-headline">What's your name?</h1>
        <p class="text-slate-400 mb-10 text-sm">Tell us who you are. This will be visible to others.</p>
        
        <div class="space-y-6">
            <div class="group">
                <label class="text-[10px] uppercase tracking-widest font-bold text-primary mb-2 block">First Name</label>
                <input id="ob-name" type="text" placeholder="e.g. Alex" class="w-full bg-white/5 border-white/10 rounded-2xl py-5 px-6 text-white focus:ring-2 focus:ring-primary transition-all text-lg font-bold"/>
            </div>
            <div class="group">
                <label class="text-[10px] uppercase tracking-widest font-bold text-primary mb-2 block">Age</label>
                <input id="ob-age" type="number" placeholder="21" class="w-full bg-white/5 border-white/10 rounded-2xl py-5 px-6 text-white focus:ring-2 focus:ring-primary transition-all text-lg font-bold"/>
            </div>
        </div>
    </div>
</template>

<template id="step-2">
    <div class="reveal-2">
        <h1 class="text-4xl font-black tracking-tighter text-white mb-2 font-headline">Your Identity</h1>
        <p class="text-slate-400 mb-10 text-sm">Select your gender and who you'd like to meet.</p>
        
        <div class="space-y-8">
            <div>
                <label class="text-[10px] uppercase tracking-widest font-bold text-primary mb-4 block">I am a</label>
                <div class="grid grid-cols-2 gap-4">
                    <button data-gender="male" class="ob-gender-btn py-5 rounded-2xl border border-white/10 bg-white/5 text-white font-bold transition-all hover:bg-white/10">Male</button>
                    <button data-gender="female" class="ob-gender-btn py-5 rounded-2xl border border-white/10 bg-white/5 text-white font-bold transition-all hover:bg-white/10">Female</button>
                </div>
            </div>
            <div>
                <label class="text-[10px] uppercase tracking-widest font-bold text-primary mb-4 block">I want to meet</label>
                <div class="grid grid-cols-3 gap-3">
                    <button data-pref="male" class="ob-pref-btn py-4 rounded-xl border border-white/10 bg-white/5 text-white text-xs font-bold transition-all">Men</button>
                    <button data-pref="female" class="ob-pref-btn py-4 rounded-xl border border-white/10 bg-white/5 text-white text-xs font-bold transition-all">Women</button>
                    <button data-pref="both" class="ob-pref-btn py-4 rounded-xl border border-white/10 bg-white/5 text-white text-xs font-bold transition-all">Both</button>
                </div>
            </div>
        </div>
    </div>
</template>

<template id="step-3">
    <div class="reveal-2">
        <h1 class="text-4xl font-black tracking-tighter text-white mb-2 font-headline">Interests</h1>
        <p class="text-slate-400 mb-10 text-sm">Select at least 3 things you love to talk about.</p>
        
        <div id="ob-tags-cloud" class="flex flex-wrap gap-3">
            <!-- Tags injected by script -->
        </div>
    </div>
</template>

<template id="step-4">
    <div class="reveal-2">
        <h1 class="text-4xl font-black tracking-tighter text-white mb-2 font-headline">Final Touch</h1>
        <p class="text-slate-400 mb-10 text-sm">Add a bio and your best photo to start matching.</p>
        
        <div class="space-y-8">
            <div class="flex items-center justify-center">
                <div id="ob-photo-picker" class="w-40 h-40 rounded-[2.5rem] bg-white/5 border-2 border-dashed border-white/20 flex flex-col items-center justify-center cursor-pointer hover:bg-white/10 transition-all group overflow-hidden">
                    <img id="ob-preview-img" class="hidden w-full h-full object-cover"/>
                    <div id="ob-photo-placeholder" class="flex flex-col items-center">
                        <span class="material-symbols-outlined text-4xl text-slate-500 group-hover:text-primary transition-colors">add_a_photo</span>
                        <span class="text-[10px] font-bold text-slate-500 mt-2 uppercase">Upload</span>
                    </div>
                </div>
            </div>
            
            <div class="group">
                <label class="text-[10px] uppercase tracking-widest font-bold text-primary mb-2 block">Your Bio</label>
                <textarea id="ob-bio" rows="3" placeholder="Tell us something interesting..." class="w-full bg-white/5 border-white/10 rounded-2xl py-5 px-6 text-white text-sm focus:ring-2 focus:ring-primary transition-all resize-none"></textarea>
            </div>
        </div>
    </div>
</template>
