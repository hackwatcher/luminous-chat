<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>

            "borderRadius": {

            "fontFamily": {

                    "body": ["Inter"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
        }
        @keyframes glow-orbit {
            0% { transform: rotate(0deg) translateX(40px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(40px) rotate(-360deg); }
        }
        .animate-pulse-soft {
            animation: pulse-soft 3s ease-in-out infinite;
        }
        .orbit {
            animation: glow-orbit 4s linear infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body antialiased overflow-hidden">
<!-- TopAppBar -->
<header class="bg-[#f7f9fb] dark:bg-slate-950 w-full top-0 px-6 py-4 fixed z-50 flex justify-between items-center no-border tonal-shift bg-[#f0f4f7] dark:bg-slate-900">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#6366F1] dark:text-[#818cf8]" data-icon="videocam">videocam</span>
<span class="font-manrope tracking-tight font-bold text-lg text-[#2a3439] dark:text-white">Luminous</span>
</div>
<div class="flex items-center gap-4">
<button class="hover:bg-[#e1e9ee] dark:hover:bg-slate-800 transition-colors duration-300 p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined text-[#2a3439] dark:text-slate-400" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Connecting Canvas -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-center bg-background px-6">
<!-- Background Ambient Element (Subtle soft blur for "Luminous" feel) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary opacity-[0.03] blur-[120px] rounded-full"></div>
</div>
<!-- Connection Visualizer -->
<div class="relative flex flex-col items-center justify-center w-full max-w-md">
<!-- Pulse/Spinner Visual -->
<div class="relative w-48 h-48 mb-12 flex items-center justify-center">
<!-- Inner Core -->
<div class="absolute w-24 h-24 bg-surface-container-lowest rounded-full shadow-[0px_12px_32px_rgba(42,52,57,0.06)] flex items-center justify-center z-20">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="person_search">person_search</span>
</div>
<!-- Orbiting Light Particle -->
<div class="absolute w-3 h-3 bg-primary rounded-full orbit z-30 shadow-[0_0_12px_rgba(73,75,214,0.4)]"></div>
<!-- Multiple Pulse Rings -->
<div class="absolute inset-0 bg-primary/10 rounded-full animate-pulse-soft"></div>
<div class="absolute inset-4 bg-primary/10 rounded-full animate-pulse-soft" style="animation-delay: 1s;"></div>
<div class="absolute inset-10 bg-primary/10 rounded-full animate-pulse-soft" style="animation-delay: 2s;"></div>
</div>
<!-- Text Content -->
<div class="text-center space-y-3 z-10">
<h1 class="font-headline font-bold text-2xl tracking-tight text-on-surface">Yeni biri aranıyor...</h1>
<p class="font-body text-on-surface-variant max-w-[280px] mx-auto text-sm leading-relaxed">
                    Güvenli ve ışık dolu bir bağlantı kurmak için topluluğumuzu tarıyoruz.
                </p>
</div>
<!-- Status Indicator Chips (Asymmetric Layout) -->
<div class="mt-12 flex flex-wrap justify-center gap-3">
<div class="px-4 py-2 bg-primary-container text-on-primary-container rounded-full text-xs font-semibold tracking-wide flex items-center gap-2">
<span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></span>
                    SİSTEM AKTİF
                </div>
<div class="px-4 py-2 bg-surface-container-highest text-on-surface-variant rounded-full text-xs font-semibold tracking-wide flex items-center gap-2">
<span class="material-symbols-outlined text-xs" data-icon="security">security</span>
                    GÜVENLİ BAĞLANTI
                </div>
</div>
</div>
<!-- Cancel/Action Button -->
<div class="absolute bottom-24">
<button class="bg-surface-container-highest text-on-surface font-semibold py-3 px-8 rounded-full hover:bg-surface-container-high transition-all duration-300 active:scale-95 flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
                Aramayı Durdur
            </button>
</div>
</main>
<!-- BottomNavBar (Hidden on desktop via shell logic) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-8 pb-6 pt-4 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl z-50 rounded-t-[1.5rem] shadow-[0px_-12px_32px_rgba(42,52,57,0.06)] md:hidden">
<a class="flex flex-col items-center justify-center bg-[#6366F1]/10 text-[#6366F1] rounded-2xl px-6 py-2 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-manrope text-[10px] uppercase tracking-widest font-semibold mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 px-6 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-manrope text-[10px] uppercase tracking-widest font-semibold mt-1">History</span>
</a>
</nav>
<!-- Aesthetic Decorative Image (Top Right - Glassmorphism) -->
<div class="fixed top-24 right-8 w-48 h-64 rounded-3xl overflow-hidden opacity-40 mix-blend-multiply hidden lg:block transform rotate-3">
<img alt="Connecting background" class="w-full h-full object-cover" data-alt="abstract flowing silk waves in soft lavender and white hues with ethereal studio lighting and clean minimalist feel" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDz2gt_-TbH5kJSD6_kE5oDLj_ZItok7lS5Yn5t5aNzGZY4US1J02skgCb41-P2ZhVUx464VuaFksMzctLSTNCk_d6bmbFdYYizZvsb-FBlnHbXnN0vohAAgK5pS5wd5e1ItBwHlxtnoTq4C5sgJMf4M77U2EM7186LwvxzeDj8-VqFwJP7lK0h9RnNcsQH9WdKbIH4Q8jEhzZJvwR9w0Z0Xrdrs5Vx9u_qyQX5n6gn-vfYYICrPQDVrkQ3G-WGE5JqILXUV816qHcA"/>
</div>
</body></html>
