<!-- Inbox / Messages Screen -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 no-border bg-gradient-to-b from-background to-transparent reveal-1">
    <div class="flex items-center gap-3">
        <div data-nav="profile" class="w-10 h-10 rounded-full border-2 border-primary/30 p-0.5 cursor-pointer">
            <img id="nav-profile-img" alt="User Profile" class="w-full h-full rounded-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPwX2yBDYarmMcdUBQiqKnUvmGDfWRuwkwBoXXHO_uR1w76liVDH4CPaI4n-G_TLAYHJQlDiGTgPPI8gzZ5kT4lKtPZ9o-xDUmZzVVdCiQV1_zWtKfgnREdKPxA4LcfuaR1WnoDGJw1FBGKA39wSyoPe7ANxK3xMHIR0KkfLQtK53F7MHDJsdIWXxFaWd8g1jgSCbbtyh5ulNz-TcueqCCNMsWhy7XmBRTuOE2au5a2hcAhvkrwlptqUrY_NgktgiHnxtDxBGT-TZ3"/>
        </div>
        <h1 class="text-2xl font-bold tracking-tighter text-on-surface font-headline">Messages</h1>
    </div>
</header>

<main class="pt-24 pb-32 px-6 overflow-y-auto h-screen hide-scrollbar reveal-2">
    <!-- Search -->
    <div class="mb-8">
        <div class="relative w-full">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">search</span>
            <input class="w-full bg-surface border-outline/10 backdrop-blur-md text-on-surface rounded-2xl py-4 pl-12 pr-6 focus:ring-2 focus:ring-primary placeholder-on-surface/30 font-body transition-all" placeholder="Search conversations..." type="text"/>
        </div>
    </div>

    <!-- Matches -->
    <section class="mb-10 text-on-surface reveal-3">
        <h2 class="text-lg font-headline font-bold mb-4 opacity-70">New Matches</h2>
        <div id="matches-row" class="flex gap-5 overflow-x-auto pb-4 hide-scrollbar">
            <div class="flex-shrink-0 w-16 h-16 rounded-full bg-surface border border-outline/10 flex items-center justify-center italic text-[10px] opacity-30 text-on-surface">Empty</div>
        </div>
    </section>

    <!-- Chats -->
    <section class="space-y-4">
        <h2 class="text-lg font-headline font-bold mb-4 text-on-surface">Chats</h2>
        <div id="chats-list" class="space-y-4">
             <div class="text-center py-20 text-gray-500 italic">Your conversations will appear here.</div>
        </div>
    </section>
</main>
