<!-- Rating / Evaluation Screen -->
<main class="flex-grow flex items-center justify-center p-4 relative h-screen w-full bg-background">
    <!-- Ambient Decoration -->
    <div class="absolute inset-0 z-0 opacity-40">
        <div class="absolute top-[10%] left-[15%] w-64 h-64 bg-primary/20 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[20%] right-[10%] w-80 h-80 bg-accent/20 rounded-full blur-[120px]"></div>
    </div>

    <!-- Evaluation Card -->
    <div class="z-10 w-full max-w-md bg-surface-container rounded-[2.5rem] p-10 flex flex-col items-center text-center shadow-2xl border border-white/5">
        <div class="mb-8 p-4 bg-primary/10 rounded-full">
            <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">sentiment_very_satisfied</span>
        </div>
        
        <h1 class="text-3xl font-extrabold tracking-tight text-on-surface mb-3 font-headline">How was the call?</h1>
        <p class="text-gray-400 font-body text-sm mb-10 leading-relaxed">Your feedback helps us make Luminous better.</p>
        
        <div class="flex justify-between w-full mb-12 px-2">
            <button class="group flex flex-col items-center gap-3 transition-all active:scale-95">
                <div class="w-14 h-14 rounded-2xl bg-surface-container-low flex items-center justify-center group-hover:bg-red-500/20 group-hover:text-red-400 transition-all">
                    <span class="material-symbols-outlined text-3xl">sentiment_dissatisfied</span>
                </div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-gray-500 group-hover:text-red-400">Bad</span>
            </button>
            <button class="group flex flex-col items-center gap-3 transition-all active:scale-95">
                <div class="w-14 h-14 rounded-2xl bg-surface-container-low flex items-center justify-center group-hover:bg-yellow-500/20 group-hover:text-yellow-400 transition-all">
                    <span class="material-symbols-outlined text-3xl">sentiment_neutral</span>
                </div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-gray-500 group-hover:text-yellow-400">Neutral</span>
            </button>
            <button class="group flex flex-col items-center gap-3 transition-all active:scale-95">
                <div class="w-14 h-14 rounded-2xl bg-surface-container-low flex items-center justify-center group-hover:bg-primary/20 group-hover:text-primary transition-all">
                    <span class="material-symbols-outlined text-3xl">sentiment_satisfied</span>
                </div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-gray-500 group-hover:text-primary">Good</span>
            </button>
        </div>

        <button id="rating-done-btn" class="w-full py-4 rounded-full primary-gradient text-white font-semibold text-base shadow-lg active:scale-95 transition-all">Done</button>
        <button id="rating-skip-btn" class="mt-6 text-gray-500 text-sm font-medium hover:text-on-surface transition-colors">Skip for now</button>
    </div>
</main>
