<!DOCTYPE html>
<html class="light" lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Pulse - Luminous Pro</title>
    
    <!-- Material Symbols & Fonts (From Pulse UI Set) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#494bd6",
                        "primary-dim": "#3c3dca",
                        "secondary": "#f8a010",
                        "background": "#f7f9fb",
                        "surface": "#f7f9fb",
                        "on-background": "#2a3439",
                        "on-surface": "#dce6f9",
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans", "Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .primary-gradient { background: linear-gradient(135deg, #494bd6 0%, #3c3dca 100%); }
        #app-container { transition: opacity 0.3s ease; }
        .screen-fade-out { opacity: 0; }
        .screen-fade-in { opacity: 1; }
    </style>
</head>
<body class="bg-[#f7f9fb] text-[#2a3439] overflow-hidden">

    <!-- The Main App Shell -->
    <div id="app-container" class="opacity-1">
        <!-- Screens will be injected here -->
        <div class="flex items-center justify-center h-screen">
            <div class="animate-pulse text-primary font-headline font-bold">Pulse Yükleniyor...</div>
        </div>
    </div>

    <!-- Hidden Video Elements for WebRTC (Logic only) -->
    <video id="local-video-logic" autoplay playsinline muted class="hidden"></video>
    <video id="remote-video-logic" autoplay playsinline class="hidden"></video>

    <!-- Project Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="services/socket.js"></script>
    <script src="services/webrtc.js"></script>
    <script src="script.js"></script>

</body>
</html>
