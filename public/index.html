<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <meta name="description" content="Luminous — anonymous random video chat with strangers"/>
    <meta name="theme-color" content="#f7f9fb"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <title>Luminous Chat</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="manifest" href="/manifest.json"/>
    <link rel="apple-touch-icon" href="/icon.png"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "var(--primary)",
                        "primary-dim": "var(--primary-dim)",
                        "primary-container": "var(--primary-container)",
                        "on-primary": "var(--on-primary)",
                        "background": "var(--background)",
                        "surface": "var(--surface)",
                        "on-surface": "var(--on-surface)",
                        "outline": "var(--outline)",
                        "error": "var(--error)"
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Plus Jakarta Sans", "sans-serif"],
                        body: ["Plus Jakarta Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css"/>
</head>

<body class="bg-background text-on-surface font-body selection:bg-primary/20 overflow-hidden">

    <!-- Background Decoration -->
    <div class="mesh-shape" style="top: -100px; left: -100px;"></div>
    <div class="mesh-shape" style="bottom: -100px; right: -100px; background: var(--accent); animation-delay: -5s;"></div>

    <!-- Ana Konteyner -->
    <div id="app-container" class="h-screen w-full relative transition-opacity duration-300">
        <div class="flex items-center justify-center h-full">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
        </div>
    </div>

    <!-- Merkezi Navigasyon Barı (Floating Island) -->
    <nav id="global-nav" class="hidden fixed z-50 flex justify-around items-center px-4 py-3 glass-effect">
        <button data-nav="discover" class="nav-btn flex flex-col items-center justify-center transition-all">
            <span class="material-symbols-outlined text-[28px]">style</span>
        </button>
        <button data-nav="matching" class="nav-btn flex flex-col items-center justify-center transition-all">
            <span class="material-symbols-outlined text-[28px]">videocam</span>
        </button>
        <button data-nav="inbox" class="nav-btn flex flex-col items-center justify-center transition-all">
            <span class="material-symbols-outlined text-[28px]">chat_bubble</span>
        </button>
        <button data-nav="history" class="nav-btn flex flex-col items-center justify-center transition-all">
            <span class="material-symbols-outlined text-[28px]">history</span>
        </button>
    </nav>

    <!-- Hidden Video Elements for Logic Handling -->
    <div style="display:none">
        <video id="local-video" autoplay playsinline muted></video>
        <video id="remote-video" autoplay playsinline></video>
    </div>

    <!-- Banned Overlay (Global) -->
    <div id="banned-overlay" class="fixed inset-0 z-[100] bg-background hidden flex-col items-center justify-center text-on-surface text-center p-6">
        <span class="material-symbols-outlined text-6xl text-error mb-4">gavel</span>
        <h1 class="font-headline font-black text-4xl mb-3">Erişim Engellendi</h1>
        <p class="text-gray-400 max-w-sm mb-2">Topluluk kurallarını ihlal ettiğiniz için uzaklaştırıldınız.</p>
        <p id="ban-time" class="text-sm font-bold text-primary"></p>
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="services/socket.js"></script>
    <script src="services/webrtc.js"></script>
    <script type="module" src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('PWA Service Worker registered');
                }).catch(err => {
                    console.log('PWA registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
