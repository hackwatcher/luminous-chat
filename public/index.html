<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Luminous — anonymous random video chat with strangers"/>
    <title>Luminous Chat</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind (CDN — replace with build step for production) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary : '#6366f1',
                        error   : '#ef4444',
                    },
                    fontFamily: {
                        headline : ['Manrope', 'sans-serif'],
                        body     : ['Inter',   'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css"/>
</head>

<body class="bg-[#0a0b16] text-white font-body min-h-screen flex flex-col overflow-hidden">

<!-- ── Top Bar ──────────────────────────────────────────────── -->
<header class="bg-[#0a0b16]/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-40">
    <div class="flex justify-between items-center px-5 py-3 max-w-screen-2xl mx-auto w-full">
        <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 rounded-xl gradient-cta flex items-center justify-center shadow-lg">
                <span class="material-symbols-outlined text-white" style="font-size:18px">videocam</span>
            </div>
            <h1 class="font-headline font-extrabold text-base tracking-tight">Luminous Chat</h1>
        </div>
        <div class="flex items-center gap-2">
            <span id="conn-dot" class="w-2 h-2 rounded-full bg-gray-600 transition-colors duration-500"></span>
            <span id="connection-status" class="text-xs font-semibold text-gray-400 max-w-[140px] truncate">Connecting…</span>
        </div>
    </div>
</header>

<!-- ── Main ─────────────────────────────────────────────────── -->
<main class="flex-grow overflow-hidden px-3 md:px-5 pt-3 pb-4" style="height:calc(100vh - 53px)">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-3 h-full">

        <!-- ── Remote Video Stage ─────────────────────────── -->
        <div class="md:col-span-3 relative rounded-2xl overflow-hidden bg-[#0f1024] flex items-center justify-center">
            <video id="remote-video" autoplay playsinline class="w-full h-full object-cover hidden"></video>

            <!-- Searching Overlay -->
            <div id="searching-overlay" class="absolute inset-0 flex flex-col items-center justify-center z-10">
                <div class="searching-bg absolute inset-0"></div>
                <div class="relative z-10 flex flex-col items-center text-center px-6">
                    <div class="searching-orb mb-8">
                        <span class="material-symbols-outlined text-white" style="font-size:48px">person_search</span>
                    </div>
                    <h2 id="overlay-text" class="text-3xl font-headline font-black text-white tracking-tight">
                        Searching for a stranger…
                    </h2>
                    <p id="overlay-sub" class="text-sm text-white/40 mt-2">
                        Please allow camera &amp; microphone access
                    </p>
                    <button id="start-btn" class="hidden mt-8 start-btn-glow flex items-center gap-2 px-10 py-3.5 rounded-full font-headline font-bold">
                        <span class="material-symbols-outlined text-lg">play_arrow</span>
                        START
                    </button>
                </div>
            </div>

            <!-- LIVE Badge -->
            <div id="live-tag" class="hidden absolute top-4 left-4 live-badge px-3 py-1.5 rounded-full flex items-center gap-2 z-20">
                <span class="w-1.5 h-1.5 bg-red-400 rounded-full animate-pulse"></span>
                <span class="text-[0.65rem] font-black uppercase tracking-widest">LIVE</span>
            </div>

            <!-- Partner ID -->
            <div id="partner-id-tag" class="hidden absolute top-4 right-4 glass-dark px-3 py-1.5 rounded-full z-20">
                <span id="partner-id-text" class="text-xs font-bold text-white/70"></span>
            </div>

            <!-- Controls Bar -->
            <div class="absolute bottom-5 left-1/2 -translate-x-1/2 controls-bar px-3 py-2 rounded-2xl flex items-center gap-2 z-20">
                <button id="toggle-mic" class="ctrl-btn" title="Toggle Microphone">
                    <span class="material-symbols-outlined" style="font-size:20px">mic</span>
                </button>
                <button id="toggle-video" class="ctrl-btn" title="Toggle Camera">
                    <span class="material-symbols-outlined" style="font-size:20px">videocam</span>
                </button>
                <div class="w-px h-6 bg-white/15 mx-1"></div>
                <button id="report-btn" class="ctrl-btn report-btn hidden" title="Report Stranger">
                    <span class="material-symbols-outlined" style="font-size:20px">flag</span>
                </button>
                <div class="w-px h-6 bg-white/15 mx-1"></div>
                <button id="next-btn" class="next-btn flex items-center gap-1.5">
                    <span class="font-headline font-black text-sm tracking-wider">NEXT</span>
                    <span class="material-symbols-outlined" style="font-size:18px">skip_next</span>
                </button>
            </div>
        </div>

        <!-- ── Sidebar ────────────────────────────────────── -->
        <div class="flex flex-col gap-3 h-full overflow-hidden">

            <!-- Self Preview -->
            <div class="relative rounded-2xl overflow-hidden bg-[#0f1024] flex-shrink-0" style="aspect-ratio:4/3">
                <video id="local-video" autoplay playsinline muted class="w-full h-full object-cover scale-x-[-1]"></video>
                <div class="absolute bottom-2 left-2 glass-dark px-2 py-1 rounded-lg">
                    <p id="my-anon-id" class="text-[0.6rem] font-bold text-white/60 uppercase tracking-wider">You</p>
                </div>
            </div>

            <!-- Chat Panel -->
            <div class="flex-grow flex flex-col bg-[#10112a] rounded-2xl overflow-hidden border border-white/5 min-h-0">
                <!-- Header -->
                <div class="flex items-center gap-2.5 px-4 py-2.5 border-b border-white/5 flex-shrink-0">
                    <div id="chat-status-dot" class="w-2 h-2 rounded-full bg-gray-600 transition-colors duration-500"></div>
                    <h3 class="font-headline font-bold text-sm">Live Chat</h3>
                    <span id="chat-partner-name" class="ml-auto text-xs text-white/25 truncate max-w-[90px]">Offline</span>
                </div>

                <!-- Messages -->
                <div id="chat-messages" class="flex-grow overflow-y-auto px-3 py-3 flex flex-col gap-1.5 min-h-0">
                    <div id="chat-placeholder" class="text-center text-xs text-white/20 my-4">
                        Chat starts when you are matched.
                    </div>
                </div>

                <!-- Input -->
                <form id="chat-form" class="flex-shrink-0 p-3 border-t border-white/5">
                    <div class="flex items-center gap-2 bg-white/5 rounded-xl px-3 py-2">
                        <input id="chat-input" disabled
                            class="flex-grow bg-transparent border-none outline-none text-sm text-white placeholder:text-white/20 disabled:opacity-40 min-w-0"
                            placeholder="Type a message…" type="text" autocomplete="off" maxlength="500"/>
                        <button type="submit" id="chat-submit" disabled class="text-primary disabled:opacity-25 transition-opacity flex-shrink-0">
                            <span class="material-symbols-outlined" style="font-size:20px">send</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</main>

<!-- ── Banned Overlay ────────────────────────────────────────── -->
<div id="banned-overlay" class="fixed inset-0 bg-black/97 z-50 hidden flex-col items-center justify-center text-white text-center px-6">
    <span class="material-symbols-outlined mb-6" style="font-size:80px;color:#ef4444">gavel</span>
    <h1 class="text-4xl font-headline font-black mb-3">Access Denied</h1>
    <p class="text-gray-400 max-w-sm mb-2">You have been removed for violating our community guidelines.</p>
    <p id="ban-time" class="text-sm font-bold text-primary">Ban expiry: calculating…</p>
</div>

<!-- ── Scripts ───────────────────────────────────────────────── -->
<script src="/socket.io/socket.io.js"></script>
<!-- Services (order matters) -->
<script src="services/socket.js"></script>
<script src="services/webrtc.js"></script>
<!-- App -->
<script src="script.js"></script>
</body>
</html>
